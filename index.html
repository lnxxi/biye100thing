<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕业倒计时｜大学100件必做清单</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            mint: '#86e3ce',
            softblue: '#b5d8fe',
            lavender: '#d4c6ff',
            pinksoft: '#ffd6e7',
            textmint: '#238c79'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .glass {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .text-shadow {
        text-shadow: 0 2px 6px rgba(0,0,0,0.08);
      }
      .fresh-gradient {
        background: linear-gradient(140deg, #b5d8fe 0%, #d4c6ff 50%, #ffd6e7 100%);
      }
      .item-hover {
        transition: all 0.25s ease;
      }
      .item-hover:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(134, 227, 206, 0.25);
      }
    }
  </style>
</head>
<body class="min-h-screen fresh-gradient p-4 md:p-8">
  <div class="max-w-5xl mx-auto">
    <!-- 标题区域 -->
    <header class="text-center mb-8">
      <h1 class="text-[clamp(2rem,5vw,3.2rem)] font-bold text-white text-shadow mb-2">
        🎓 毕业倒计时
      </h1>
      <p class="text-white/95 text-lg">趁微风正好，完成大学100件小事，不留青春遗憾✨</p>
    </header>

    <!-- 倒计时卡片 -->
    <div class="glass rounded-3xl p-6 md:p-10 shadow-lg mb-8">
      <div class="flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="w-full md:w-3/5">
          <h2 class="text-2xl font-bold text-slate-700 mb-4">⏳ 距离毕业还有</h2>
          <div id="countdown-box" class="flex gap-3 md:gap-5 flex-wrap">
            <div class="bg-mint text-textmint rounded-2xl px-4 py-3 min-w-[70px] text-center">
              <div id="day" class="text-3xl font-bold">00</div>
              <div class="text-sm opacity-80">天</div>
            </div>
            <div class="bg-softblue text-indigo-700 rounded-2xl px-4 py-3 min-w-[70px] text-center">
              <div id="hour" class="text-3xl font-bold">00</div>
              <div class="text-sm opacity-80">时</div>
            </div>
            <div class="bg-lavender text-purple-700 rounded-2xl px-4 py-3 min-w-[70px] text-center">
              <div id="min" class="text-3xl font-bold">00</div>
              <div class="text-sm opacity-80">分</div>
            </div>
            <div class="bg-pinksoft text-rose-600 rounded-2xl px-4 py-3 min-w-[70px] text-center">
              <div id="sec" class="text-3xl font-bold">00</div>
              <div class="text-sm opacity-80">秒</div>
            </div>
          </div>
        </div>
        <div class="w-full md:w-2/5">
          <label class="text-slate-600 font-medium block mb-2">📅 设置毕业日期</label>
          <input type="date" id="grad-date" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-mint/70">
          <button onclick="saveGradDate()" class="mt-3 w-full bg-mint text-textmint py-2.5 rounded-xl hover:opacity-90 transition font-medium">
            💾 保存日期
          </button>
        </div>
      </div>
    </div>

    <!-- 完成进度统计 -->
    <div class="glass rounded-3xl p-6 shadow-lg mb-8">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold text-slate-700">📊 完成进度</h2>
        <span id="progress-text" class="font-semibold text-textmint">0/100</span>
      </div>
      <div class="w-full h-4 bg-slate-100 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-mint w-0 transition-all duration-500"></div>
      </div>
      <div class="flex gap-3 mt-4 flex-wrap">
        <button onclick="clearAllCheck()" class="px-4 py-2 bg-slate-100 rounded-lg text-slate-600 hover:bg-slate-200 transition">
          🔄 清空全部勾选
        </button>
        <button onclick="saveAllData()" class="px-4 py-2 bg-mint/20 rounded-lg text-textmint hover:bg-mint/30 transition">
          📁 手动保存记录
        </button>
      </div>
    </div>

    <!-- 100件必做清单 -->
    <div class="glass rounded-3xl p-6 md:p-8 shadow-lg">
      <h2 class="text-2xl font-bold text-slate-700 mb-6 text-center">📜 大学必做100件小事清单</h2>
      <div id="todo-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <!-- JS自动渲染100条待办 -->
      </div>
    </div>

    <footer class="text-center mt-8 text-white/90 text-sm">
      <p>收集校园里所有温柔小事，愿我们奔赴闪闪发光的远方 🌿</p>
    </footer>
  </div>

  <script>

      "23. 🎬 独自去影院看一场深夜电影",
      "24. 🍢 和朋友逛校园周边夜市",

      "27. 🩸 参与一次无偿献血活动",

      "29. ☕ 期末周在图书馆通宵复习",
      "30. ✉️ 给毕业之后的自己写一封信",
      "31. 🧑‍🤝‍🧑 担任一次小组作业组长",
      "32. 🖥 独立完成完整课堂PPT展示",
      "33. 🍳 学会几道简单家常菜",
      "34. 💼 课外兼职体验打工生活",
      "35. 🎞 观看校园露天放映电影",
      "36. 🍲 和全班同学集体聚餐",
      "37. 🌅 坚持一个月早睡早起自律作息",

      "46. 📘 通读专业核心经典教材",
      "47. ✂️ 学会基础PS与视频剪辑",
      "48. ☔ 雨天撑伞漫步校园小路",
      "49. 🎂 和好友办一场简单生日聚会",

      "70. 🏃‍♀️ 坚持三个月运动塑形减脂",
      "71. 🎊 参与校园节日晚会布置工作",
      "72. 🏙 慢慢读懂所在城市的文化",

      "77. 🧑‍🏫 采访优秀学长学姐取经验",

      "80. 🤍 坦然承认自己犯下的错误",
      "81. 📷 拍摄一套专属毕业写真",
      "82. 🤗 和每位室友单独合影留念",
      "83. 🏫 走遍校园每一栋教学楼",
      "84. 🙋 完整参与社团新生招新活动",
      "85. 🪙 学习基础个人理财知识",
      "86. 📖 在图书馆借阅十本不同类型书籍",
      "87. 🛒 校园集市摆摊体验小创业",
      "88. 🤝 释怀与曾经有矛盾的同学",
      "89. 🚌 坐公交探索整座城市街巷",
      "90. 📜 背诵长诗并当众朗读",
      "91. 🎀 准备精致毕业礼物送给挚友",
      "92. 🧩 独立解决一件棘手困难",
      "93. 🌟 打卡校园全部网红取景地点",
      "94. 📖 保持每月读完一本书的习惯",
      "95. 💬 找辅导员深度谈心一次",
      "96. 📒 记录校园四季日常随笔日记",
      "97. 🚀 大胆尝试一件从未体验过的新鲜事",
      "98. 🏠 不靠家人独立生活完整一周",
      "99. 👨‍👩‍👧‍👦 和全班拍摄完整毕业大合照",
      "100. 🌊 好好告别校园，奔赴下一场山海"
    ];

    const STORAGE_KEY_CHECK = 'uni_todo_checklist';
    const STORAGE_KEY_DATE = 'graduation_date';
    let checkStatus = JSON.parse(localStorage.getItem(STORAGE_KEY_CHECK)) || {};

    // 初始化毕业日期
    function initGradDate() {
      const saveDate = localStorage.getItem(STORAGE_KEY_DATE);
      const dateInput = document.getElementById('grad-date');
      if (saveDate) dateInput.value = saveDate;
      else {
        dateInput.value = "2027-06-30";
        saveGradDate();
      }
    }
    function saveGradDate() {
      const val = document.getElementById('grad-date').value;
      localStorage.setItem(STORAGE_KEY_DATE, val);
      alert("毕业日期保存成功～");
    }

    // 倒计时计算
    function updateCountDown() {
      const targetDate = new Date(localStorage.getItem(STORAGE_KEY_DATE));
      const now = new Date();
      let diff = targetDate - now;
      if (diff <= 0) {
        document.getElementById('day').innerText = "00";
        document.getElementById('hour').innerText = "00";
        document.getElementById('min').innerText = "00";
        document.getElementById('sec').innerText = "00";
        return;
      }
      const day = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hour = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const min = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const sec = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById('day').innerText = String(day).padStart(2, '0');
      document.getElementById('hour').innerText = String(hour).padStart(2, '0');
      document.getElementById('min').innerText = String(min).padStart(2, '0');
      document.getElementById('sec').innerText = String(sec).padStart(2, '0');
    }

    // 渲染清单
    function renderTodoList() {
      const container = document.getElementById('todo-list');
      container.innerHTML = "";
      todoData.forEach((item, idx) => {
        const id = idx;
        const isChecked = checkStatus[id] || false;
        const div = document.createElement('div');
        div.className = `item-hover p-3.5 rounded-xl border ${isChecked ? 'bg-mint/20 border-mint/40' : 'bg-white border-slate-100'}`;
        div.innerHTML = `
          <label class="flex items-start gap-2 cursor-pointer">
            <input type="checkbox" ${isChecked ? "checked" : ""} onchange="toggleCheck(${id})" class="mt-1 w-4 h-4 accent-mint">
            <span class="${isChecked ? 'line-through text-slate-400' : 'text-slate-700'}">${item}</span>
          </label>
        `;
        container.appendChild(div);
      })
      updateProgress();
    }

    function toggleCheck(id) {
      checkStatus[id] = !checkStatus[id];
      saveAllData();
      renderTodoList();
    }

    function updateProgress() {
      const total = todoData.length;
      const finished = Object.values(checkStatus).filter(v => v).length;
      const percent = (finished / total) * 100;
      document.getElementById('progress-text').innerText = `${finished}/${total}`;
      document.getElementById('progress-bar').style.width = `${percent}%`;
    }

    function saveAllData() {
      localStorage.setItem(STORAGE_KEY_CHECK, JSON.stringify(checkStatus));
    }

    function clearAllCheck() {
      if(!confirm("确定清空所有已完成勾选吗？记录无法恢复哦")) return;
      checkStatus = {};
      saveAllData();
      renderTodoList();
    }

    window.onload = function() {
      initGradDate();
      updateCountDown();
      renderTodoList();
      setInterval(updateCountDown, 1000);
    }
  </script>
</body>
</html>
